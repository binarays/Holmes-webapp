<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Holmes - Spam Email Detector</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Header Navigation -->
    <header class="navbar navbar-expand-lg px-4 py-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <!-- Logo in Left Top Corner -->
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="#">
                <div class="logo-icon bg-brand-gradient p-2 rounded-3 d-flex align-items-center justify-content-center text-white shadow-sm"
                    style="width: 40px; height: 40px;">
                    <i class="bi bi-envelope-paper-fill fs-5"></i>
                </div>
                <span class="logo-text bg-brand-text-gradient fs-4">MailScan</span>
            </a>

            <!-- Dark / Light Theme Toggle in Right Top Corner -->
            <button id="theme-toggle"
                class="btn btn-theme-toggle border-0 rounded-circle p-2 d-flex align-items-center justify-content-center"
                aria-label="Toggle Theme">
                <i class="bi bi-sun-fill text-warning fs-5 d-none" id="theme-sun"></i>
                <i class="bi bi-moon-stars-fill text-secondary fs-5" id="theme-moon"></i>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container flex-grow-1 d-flex flex-column justify-content-center my-4 py-3 main-content-container">
        <!-- Dynamic Greeting outside the main grid to align heights -->
        <div class="row mb-2">
            <div class="col-12">
                <h3 id="welcome-greeting" class="fw-bold greeting-title">Good morning Neighbour!</h3>
            </div>
        </div>

        <div class="row g-4 align-items-stretch justify-content-center">
            <!-- Left Side: Interactive Input Panel -->
            <div class="col-lg-7 d-flex flex-column">
                <!-- Textarea & Action Card Styled After Reference Image -->
                <div
                    class="custom-input-card shadow-sm rounded-4 border p-3 flex-grow-1 d-flex flex-column justify-content-between">
                    <textarea id="email-content"
                        class="form-control border-0 p-2 shadow-none bg-transparent flex-grow-1" rows="8"
                        placeholder="📋︎ Enter your email content here..."></textarea>

                    <div class="divider my-3"></div>

                    <div class="d-flex justify-content-between align-items-center">
                        <!-- Send Button with brand colors/gradient -->
                        <button id="send-btn"
                            class="btn btn-brand btn-send d-inline-flex align-items-center gap-2 px-4 py-2 border-0 rounded-3 text-white fw-semibold">
                            <i class="bi bi-search"></i>
                            <span>Check Content</span>
                        </button>

                        <!-- Version info text on the right -->
                        <span class="text-secondary small fw-medium px-2">version 1.0</span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Circular Progress Ring -->
            <div class="col-lg-5 d-flex flex-column">
                <div
                    class="progress-card w-100 shadow-sm rounded-4 border p-4 text-center d-flex flex-column align-items-center justify-content-center flex-grow-1">
                    <h5 id="progress-card-title" class="progress-title mb-4 fw-bold text-secondary">Email Score</h5>

                    <!-- SVG Circular Progress Ring -->
                    <div class="position-relative d-inline-flex align-items-center justify-content-center my-3">
                        <svg class="progress-ring" width="180" height="180">
                            <!-- Thin Background track -->
                            <circle class="progress-ring-bg" stroke="#f1f5f9" stroke-width="2" fill="transparent" r="76"
                                cx="90" cy="90" />
                            <!-- Thin Progress active indicator -->
                            <circle class="progress-ring-circle" stroke="#2563eb" stroke-width="2" fill="transparent"
                                r="76" cx="90" cy="90" stroke-linecap="round" />
                        </svg>
                        <!-- Centered Percentage Text -->
                        <div class="position-absolute fs-2 fw-bold progress-value" id="progress-text">0%</div>
                    </div>

                    <!-- Dynamic Spam Status Indicator -->
                    <div id="spam-status" class="mt-2 fw-bold fs-5 transition-all" style="color: rgb(37, 99, 235);">Safe
                        Email</div>

                    <!-- Interactive control for demonstration/testing -->
                    <div class="w-100 px-3 mt-4">
                        <label for="progress-slider" class="form-label text-muted small mb-2">Simulate Spam
                            Score</label>
                        <input type="range" class="form-range" id="progress-slider" min="0" max="100" value="0">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 border-top mt-auto">
        <p class="mb-0 text-muted small">© 2026 ABC Corporation. All rights reserved.</p>
    </footer>

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <!-- Custom JavaScript -->
    <script src="../static/js/script.js"></script>
</body>

</html>
